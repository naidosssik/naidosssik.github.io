<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrayBit-7 Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="toolbar__group">
        <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gb7" hidden>
        <label for="fileInput" class="button button--primary">Открыть</label>
        <button class="button" id="eyedropperBtn" title="Пипетка (E)">🎯 Пипетка</button>
        <button class="button" id="downloadPngBtn">Скачать PNG</button>
        <button class="button" id="downloadJpgBtn">Скачать JPG</button>
        <button class="button" id="downloadGb7Btn">Скачать GB7</button>
        <label class="mask-option">
          <input type="checkbox" id="maskCheckbox">
          GB7 с маской
        </label>
      </div>
    </div>

    <div class="workspace">
      <aside class="sidebar">
        <h2>Информация</h2>
        <div class="info-list">
          <div>Имя файла: <span id="fileName">—</span></div>
          <div>Формат: <span id="fileFormat">—</span></div>
          <div>Размер: <span id="imageSize">—</span></div>
          <div>Глубина цвета: <span id="colorDepth">—</span></div>
          <div>Маска: <span id="maskInfo">—</span></div>
        </div>

        <hr>

        <h2>Пипетка</h2>
        <div id="eyedropperResult" class="eyedropper-result">
          <div class="pip-line">Координаты: <span id="pipCoord">—</span></div>
          <div class="pip-line">RGB: <span id="pipRGB">—</span></div>
          <div class="pip-line">CIELAB: <span id="pipLab">—</span></div>
        </div>

        <hr>
        <p class="hint">
          Поддерживаются PNG, JPG и GB7.<br>
          Для GB7 изображение хранится в оттенках серого, 7 бит яркости + 1 бит маски.
        </p>
      </aside>

      <main class="canvas-panel">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
      </main>
    </div>

    <footer class="status-bar" id="statusText">Нет загруженного изображения</footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
